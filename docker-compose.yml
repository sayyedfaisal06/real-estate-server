version: "3.9"

services:
  backend:
    build: .
    container_name: propflow_backend
    restart: unless-stopped
    ports:
      - "4000:4000"

    env_file:
      - .env

    environment:
      NODE_ENV: development

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - .:/app
      - /app/node_modules

    command: sh -c "npx prisma generate && npm run dev"

  redis:
    image: redis:7-alpine
    container_name: propflow_redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
